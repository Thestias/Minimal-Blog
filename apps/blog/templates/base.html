{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Perblog</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/base.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@700&display=swap" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet"> 
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block new_css %}{% endblock %}
</head>
<body>
    <nav class="my_navbar">
        <a class='nav_element' href="{% url 'homepage' %}">Home</a>
        {% if user.is_authenticated %}
            <a class='nav_element' href="{% url 'new_blog' %}">Add Post</a>
            <a class='nav_element' href="{% url 'profile' %}">Profile</a>
            <a class='nav_element' href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a class='nav_element' href="{% url 'login' %}">Login</a>
            <a class='nav_element' href="{% url 'register' %}">Register</a>
        {% endif %}
        <a class='nav_element' href="{% url 'about' %}">About</a>
    </nav>

    <div class='container'>
        {% block content_1 %}{% endblock %}
    </div>
</body>
</html>
